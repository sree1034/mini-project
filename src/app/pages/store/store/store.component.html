<section
  class="header"
  style="
    background-image: url(https://wallpaperaccess.com/full/306739.jpg);
    height: 100%;
  "
>
  <div class="mask" style="background-color: rgba(0, 0, 0, 0.7)">
    <div class="container">
      <div class="row">
        <div class="col-lg-3 pt-4" *ngFor="let item of store">
          <div class="card" style="width: 18rem">
            <div class="embed-responsive embed-responsive">
              <img
                class="card-img-top embed-responsive-item"
                src="{{ item.thumbnail }}"
                alt="Card image cap"
              />
            </div>
            <!--<div class="card-body">-->
            <!--<h5 class="card-title"></h5>-->
            <a (click)="gotoHere(item.id)" class="stretched-link"></a>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
